<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Harness</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0E1117; --surface:#161B24; --surface-2:#1D2430; --border:#2A3240;
    --text:#E6EAF2; --muted:#8B94A6; --agent:#56C7D6; --skill:#E2A855;
    --success:#6BCB77; --danger:#E06C75;
    --font-display:"Space Grotesk",sans-serif; --font-body:"Inter",system-ui,sans-serif;
    --font-mono:"JetBrains Mono",ui-monospace,monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:15px; line-height:1.6; }
  button { font-family:inherit; cursor:pointer; }
  ::-webkit-scrollbar { width:9px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:5px; }
  .hidden { display:none !important; }

  /* ---------- 登入頁 ---------- */
  #auth { height:100vh; display:grid; place-items:center; padding:20px; }
  .auth-card { width:100%; max-width:360px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; }
  .auth-card h1 { font-family:var(--font-display); font-size:20px; display:flex; align-items:center; gap:9px; margin-bottom:4px; }
  .auth-card .dot { width:9px; height:9px; border-radius:50%; background:var(--agent); }
  .auth-card p.sub { color:var(--muted); font-size:13px; margin-bottom:20px; }
  .tabs { display:flex; gap:6px; margin-bottom:16px; }
  .tabs button { flex:1; padding:8px; background:var(--surface-2); border:1px solid var(--border); color:var(--muted); border-radius:9px; font-weight:500; }
  .tabs button.active { color:var(--text); border-color:var(--agent); }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12.5px; color:var(--muted); margin-bottom:5px; }
  .field input { width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:9px; padding:10px 12px; font-family:inherit; font-size:14px; }
  .field input:focus { outline:none; border-color:var(--agent); }
  .btn-primary { width:100%; background:var(--agent); color:#0A0E14; border:none; border-radius:9px; padding:11px; font-weight:600; margin-top:6px; }
  .btn-primary:hover { opacity:.9; }
  .auth-err { color:var(--danger); font-size:12.5px; margin-top:10px; min-height:18px; }

  /* ---------- 主應用 ---------- */
  #app { height:100vh; display:grid; grid-template-rows:auto 1fr; }
  .topbar { display:flex; align-items:center; gap:14px; padding:11px 18px; border-bottom:1px solid var(--border); background:var(--surface); }
  .topbar .brand { font-family:var(--font-display); font-weight:700; font-size:16px; display:flex; align-items:center; gap:8px; }
  .topbar .dot { width:8px; height:8px; border-radius:50%; background:var(--success); }
  .ws-switch { display:flex; align-items:center; gap:6px; margin-left:8px; }
  select.ws { background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-family:inherit; font-size:13.5px; }
  .icon-btn { background:var(--surface-2); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:6px 11px; font-size:13px; }
  .icon-btn:hover { color:var(--text); border-color:var(--agent); }
  .topbar .spacer { flex:1; }

  .body { display:grid; grid-template-columns:260px 1fr; overflow:hidden; }
  aside { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .new-conv { margin:14px; padding:10px; background:var(--surface-2); border:1px dashed var(--border); border-radius:10px; color:var(--text); font-weight:500; font-size:14px; }
  .new-conv:hover { border-color:var(--agent); }
  .conv-list { flex:1; overflow-y:auto; padding:0 10px 14px; }
  .conv-item { display:flex; align-items:center; gap:8px; padding:9px 11px; border-radius:9px; color:var(--muted); font-size:13.5px; margin-bottom:3px; cursor:pointer; }
  .conv-item:hover, .conv-item.active { background:var(--surface-2); color:var(--text); }
  .conv-item .title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .conv-item .del { opacity:0; color:var(--muted); font-size:15px; padding:0 4px; background:none; border:none; }
  .conv-item:hover .del { opacity:.7; }
  .conv-item .del:hover { color:var(--danger); opacity:1; }

  main { display:flex; flex-direction:column; overflow:hidden; }
  #stream { flex:1; overflow-y:auto; padding:26px; display:flex; flex-direction:column; gap:18px; scroll-behavior:smooth; }
  .empty { margin:auto; text-align:center; color:var(--muted); max-width:400px; }
  .empty h2 { font-family:var(--font-display); color:var(--text); font-size:20px; margin-bottom:8px; }

  .row { display:flex; gap:13px; max-width:780px; }
  .row.user { align-self:flex-end; flex-direction:row-reverse; }
  .avatar { flex-shrink:0; width:30px; height:30px; border-radius:8px; display:grid; place-items:center; font-family:var(--font-mono); font-size:12px; font-weight:600; }
  .avatar.agent { background:color-mix(in srgb,var(--agent) 18%,var(--surface)); color:var(--agent); }
  .avatar.user  { background:var(--surface-2); color:var(--muted); }
  .bubble { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 15px; white-space:pre-wrap; word-break:break-word; }
  .row.user .bubble { background:var(--surface-2); border-color:transparent; }

  .trace { font-family:var(--font-mono); font-size:12.5px; background:color-mix(in srgb,var(--skill) 7%,var(--surface)); border:1px solid color-mix(in srgb,var(--skill) 28%,var(--border)); border-left:2.5px solid var(--skill); border-radius:8px; padding:9px 13px; max-width:780px; align-self:flex-start; margin-left:43px; }
  .trace .call { color:var(--skill); } .trace .args { color:var(--muted); }
  .trace .result { color:var(--text); margin-top:5px; padding-top:5px; border-top:1px dashed var(--border); }
  .trace .result::before { content:"→ "; color:var(--success); }

  .cite { display:inline-block; font-family:var(--font-mono); font-size:11px; line-height:1; color:var(--agent); background:color-mix(in srgb,var(--agent) 14%,transparent); border-radius:4px; padding:2px 4px; margin:0 1px; text-decoration:none; vertical-align:text-top; }
  a.cite:hover { background:color-mix(in srgb,var(--agent) 30%,transparent); }
  .sources { margin-top:12px; padding-top:10px; border-top:1px solid var(--border); }
  .sources-title { font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .src { font-size:12.5px; color:var(--muted); margin:3px 0; }
  .src-n { font-family:var(--font-mono); color:var(--agent); margin-right:6px; }
  .src a { color:var(--text); text-decoration:none; } .src a:hover { text-decoration:underline; }

  .composer { border-top:1px solid var(--border); padding:16px 26px 20px; }
  .composer .box { max-width:806px; display:flex; gap:10px; align-items:flex-end; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:8px 8px 8px 16px; margin:0 auto; }
  .composer .box:focus-within { border-color:var(--agent); }
  textarea { flex:1; background:none; border:none; color:var(--text); font-family:inherit; font-size:15px; resize:none; max-height:160px; line-height:1.5; padding:6px 0; }
  textarea:focus { outline:none; } textarea::placeholder { color:var(--muted); }
  .send { flex-shrink:0; background:var(--agent); color:#0A0E14; border:none; border-radius:9px; width:38px; height:38px; display:grid; place-items:center; }
  .send:hover { opacity:.88; } .send:disabled { opacity:.4; }

  /* ---------- 記憶面板 ---------- */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:40; }
  .panel { position:fixed; top:0; right:0; width:360px; max-width:90vw; height:100vh; background:var(--surface); border-left:1px solid var(--border); z-index:50; display:flex; flex-direction:column; }
  .panel h3 { font-family:var(--font-display); font-size:16px; padding:18px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .panel .close { background:none; border:none; color:var(--muted); font-size:20px; }
  .panel .desc { color:var(--muted); font-size:12.5px; padding:12px 20px 4px; }
  .mem-list { flex:1; overflow-y:auto; padding:8px 16px 16px; }
  .mem-item { display:flex; gap:10px; align-items:flex-start; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:11px 13px; margin-bottom:8px; font-size:13.5px; }
  .mem-item .txt { flex:1; } .mem-item .del { background:none; border:none; color:var(--muted); font-size:15px; }
  .mem-item .del:hover { color:var(--danger); }
  .mem-empty { color:var(--muted); font-size:13px; padding:16px 20px; }

  .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--surface-2); border:1px solid color-mix(in srgb,var(--success) 40%,var(--border)); color:var(--text); font-size:13px; padding:10px 16px; border-radius:10px; z-index:60; }

  @media (max-width:720px) { .body { grid-template-columns:1fr; } aside { display:none; } .trace { margin-left:0; } }
</style>
</head>
<body>

<div id="auth">
  <div class="auth-card">
    <h1><span class="dot"></span>Agent Harness</h1>
    <p class="sub">登入以使用你的 workspace 與對話</p>
    <div class="tabs">
      <button id="tab-login" class="active">登入</button>
      <button id="tab-register">註冊</button>
    </div>
    <div class="field"><label>使用者名稱</label><input id="au-user" autocomplete="username" /></div>
    <div class="field"><label>密碼</label><input id="au-pass" type="password" autocomplete="current-password" /></div>
    <button class="btn-primary" id="au-submit">登入</button>
    <div class="auth-err" id="au-err"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand"><span class="dot"></span>Agent Harness</div>
    <div class="ws-switch">
      <select class="ws" id="ws-select"></select>
      <button class="icon-btn" id="ws-new" title="新增 workspace">＋</button>
      <button class="icon-btn" id="ws-invite" title="邀請成員">邀請</button>
    </div>
    <div class="spacer"></div>
    <button class="icon-btn" id="mem-open">🧠 記憶</button>
    <button class="icon-btn" id="logout">登出</button>
  </div>

  <div class="body">
    <aside>
      <button class="new-conv" id="new-conv">＋ 新對話</button>
      <div class="conv-list" id="conv-list"></div>
    </aside>
    <main>
      <div id="stream">
        <div class="empty"><h2>開始對話</h2><p>從左側新建對話，或直接在下方輸入。skill 呼叫與來源會即時顯示在對話中。</p></div>
      </div>
      <div class="composer">
        <div class="box">
          <textarea id="input" rows="1" placeholder="輸入訊息，Enter 送出、Shift+Enter 換行"></textarea>
          <button class="send" id="send" title="送出">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
// 同源部署（走 nginx 反代）用 ""；非 docker 本機開發改成 "http://localhost:8000"
const API = "";
const TOKEN_KEY = "harness_token";
let token = localStorage.getItem(TOKEN_KEY) || null;
let workspaceId = null, conversationId = null;

const $ = s => document.querySelector(s);
const esc = s => (s ?? "").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

async function api(path, { method="GET", body=null } = {}) {
  const headers = { "Content-Type":"application/json" };
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : null });
  if (res.status === 401) { doLogout(); throw new Error("未授權"); }
  if (!res.ok) throw new Error((await res.json().catch(()=>({}))).detail || res.statusText);
  return res.status === 204 ? null : res.json();
}

/* ---------- 登入 ---------- */
let authMode = "login";
$("#tab-login").onclick  = () => setAuthMode("login");
$("#tab-register").onclick = () => setAuthMode("register");
function setAuthMode(m){
  authMode = m;
  $("#tab-login").classList.toggle("active", m==="login");
  $("#tab-register").classList.toggle("active", m==="register");
  $("#au-submit").textContent = m==="login" ? "登入" : "註冊";
  $("#au-err").textContent = "";
}
$("#au-submit").onclick = doAuth;
$("#au-pass").addEventListener("keydown", e => { if (e.key==="Enter") doAuth(); });
async function doAuth(){
  const username = $("#au-user").value.trim(), password = $("#au-pass").value;
  if (!username || !password) { $("#au-err").textContent = "請輸入帳號與密碼"; return; }
  try {
    const r = await api("/auth/" + authMode, { method:"POST", body:{ username, password } });
    token = r.token; localStorage.setItem(TOKEN_KEY, token);
    await enterApp();
  } catch (e) { $("#au-err").textContent = e.message; }
}
function doLogout(){
  token = null; localStorage.removeItem(TOKEN_KEY);
  $("#app").classList.add("hidden"); $("#auth").classList.remove("hidden");
}
$("#logout").onclick = doLogout;

/* ---------- 進入應用 ---------- */
async function enterApp(){
  $("#auth").classList.add("hidden"); $("#app").classList.remove("hidden");
  await loadWorkspaces();
}
async function loadWorkspaces(){
  const list = await api("/workspaces");
  const sel = $("#ws-select"); sel.innerHTML = "";
  list.forEach(w => { const o=document.createElement("option"); o.value=w.id; o.textContent=w.name+"（"+w.role+"）"; sel.appendChild(o); });
  workspaceId = list.length ? list[0].id : null;
  if (workspaceId) sel.value = workspaceId;
  await loadConversations();
}
$("#ws-select").onchange = async e => { workspaceId = +e.target.value; conversationId = null; clearStream(); await loadConversations(); };
$("#ws-new").onclick = async () => {
  const name = prompt("新 workspace 名稱："); if (!name) return;
  await api("/workspaces", { method:"POST", body:{ name } }); await loadWorkspaces();
};
$("#ws-invite").onclick = async () => {
  const username = prompt("邀請哪位使用者（輸入其帳號）："); if (!username) return;
  try { await api("/workspaces/"+workspaceId+"/members", { method:"POST", body:{ username } }); toast("已加入成員"); }
  catch (e) { toast("邀請失敗：" + e.message); }
};

/* ---------- 對話列表 ---------- */
async function loadConversations(){
  if (!workspaceId) return;
  const list = await api("/workspaces/"+workspaceId+"/conversations");
  const box = $("#conv-list"); box.innerHTML = "";
  list.forEach(cv => {
    const item = document.createElement("div");
    item.className = "conv-item" + (cv.id===conversationId ? " active" : "");
    item.innerHTML = `<span class="title">${esc(cv.title)}</span><button class="del" title="刪除">×</button>`;
    item.querySelector(".title").onclick = () => selectConversation(cv.id);
    item.querySelector(".del").onclick = async ev => {
      ev.stopPropagation();
      if (!confirm("刪除這個對話？")) return;
      await api("/conversations/"+cv.id, { method:"DELETE" });
      if (cv.id===conversationId) { conversationId=null; clearStream(); }
      loadConversations();
    };
    box.appendChild(item);
  });
}
$("#new-conv").onclick = async () => {
  const cv = await api("/workspaces/"+workspaceId+"/conversations", { method:"POST", body:{} });
  conversationId = cv.id; clearStream(); await loadConversations();
};
async function selectConversation(cid){
  conversationId = cid; clearStream();
  const msgs = await api("/conversations/"+cid+"/messages");
  loadConversations();
  if (!msgs.length) return;
  clearEmpty();
  msgs.forEach(m => {
    if (m.role === "user") addMessage("user", esc(m.content));
    else {
      const sources = {}; (m.sources||[]).forEach(s => sources[s.n]=s);
      const b = addMessage("agent", renderCitations(m.content, sources));
      b.insertAdjacentHTML("beforeend", sourceListHTML(sources));
    }
  });
}

/* ---------- 聊天渲染 ---------- */
const stream = $("#stream"), input = $("#input"), sendBtn = $("#send");
function clearEmpty(){ const e = stream.querySelector(".empty"); if (e) e.remove(); }
function clearStream(){ stream.innerHTML = `<div class="empty"><h2>開始對話</h2><p>輸入訊息開始，skill 呼叫與來源會即時顯示。</p></div>`; }
function scrollDown(){ stream.scrollTop = stream.scrollHeight; }
function addMessage(role, html){
  clearEmpty();
  const row = document.createElement("div"); row.className = "row " + role;
  row.innerHTML = `<div class="avatar ${role}">${role==="user"?"你":"AI"}</div><div class="bubble">${html}</div>`;
  stream.appendChild(row); scrollDown(); return row.querySelector(".bubble");
}
function addTrace(skill, args){
  const el = document.createElement("div"); el.className = "trace";
  el.innerHTML = `<div><span class="call">${esc(skill)}</span><span class="args">(${esc(JSON.stringify(args))})</span></div><div class="result">…</div>`;
  stream.appendChild(el); scrollDown(); return el;
}
function renderCitations(content, sources){
  return esc(content).replace(/\[(\d+)\]/g, (_, n) => {
    const s = sources[n]; const t = s ? esc(s.name||"") : "";
    if (s && s.url) return `<a class="cite" href="${esc(s.url)}" target="_blank" rel="noopener" title="${t}">[${n}]</a>`;
    return `<span class="cite" title="${t}">[${n}]</span>`;
  });
}
function sourceListHTML(sources){
  const ns = Object.keys(sources).map(Number).sort((a,b)=>a-b);
  if (!ns.length) return "";
  return `<div class="sources"><div class="sources-title">來源</div>` + ns.map(n=>{
    const s=sources[n], name=esc(s.name||("來源 "+n));
    const inner = s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">${name}</a>` : name;
    return `<div class="src"><span class="src-n">[${n}]</span>${inner}</div>`;
  }).join("") + `</div>`;
}

async function send(){
  const text = input.value.trim(); if (!text) return;
  if (!conversationId) {
    const cv = await api("/workspaces/"+workspaceId+"/conversations", { method:"POST", body:{} });
    conversationId = cv.id;
  }
  input.value=""; input.style.height="auto"; sendBtn.disabled=true;
  addMessage("user", esc(text));
  const pending = {}, sources = {};
  try {
    const res = await fetch(API + "/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+token },
      body: JSON.stringify({ conversation_id: conversationId, message: text }),
    });
    const reader = res.body.getReader(); const dec = new TextDecoder(); let buf="";
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream:true });
      const parts = buf.split("\n\n"); buf = parts.pop();
      for (const p of parts) {
        const line = p.replace(/^data: /,"").trim(); if (!line) continue;
        const ev = JSON.parse(line);
        if (ev.type==="skill_call") { (pending[ev.skill]=pending[ev.skill]||[]).push(addTrace(ev.skill, ev.args)); }
        else if (ev.type==="skill_result") {
          const t=(pending[ev.skill]||[]).shift(); if (t) t.querySelector(".result").textContent = ev.result;
          if (ev.sources) ev.sources.forEach(s => sources[s.n]=s);
        }
        else if (ev.type==="final") {
          const b = addMessage("agent", renderCitations(ev.content, sources));
          b.insertAdjacentHTML("beforeend", sourceListHTML(sources)); scrollDown();
        }
        else if (ev.type==="memory_saved") { toast("🧠 已記住：" + ev.items.join("、")); }
        else if (ev.type==="error") { addMessage("agent", `<span style="color:var(--danger)">錯誤：${esc(ev.message)}</span>`); }
      }
    }
    loadConversations();
  } catch (e) { addMessage("agent", `<span style="color:var(--danger)">連線失敗：${esc(e.message)}</span>`); }
  finally { sendBtn.disabled=false; input.focus(); }
}
sendBtn.onclick = send;
input.addEventListener("keydown", e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
input.addEventListener("input", () => { input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,160)+"px"; });

/* ---------- 記憶面板 ---------- */
$("#mem-open").onclick = openMemory;
async function openMemory(){
  const mems = await api("/memories");
  const overlay = document.createElement("div"); overlay.className="overlay";
  const panel = document.createElement("div"); panel.className="panel";
  const items = mems.length
    ? mems.map(m => `<div class="mem-item" data-id="${m.id}"><span class="txt">${esc(m.content)}</span><button class="del" title="刪除">×</button></div>`).join("")
    : `<div class="mem-empty">目前還沒有長期記憶。多聊幾句，系統會自動記下你的偏好與穩定事實。</div>`;
  panel.innerHTML = `<h3>你的長期記憶 <button class="close">×</button></h3>
    <div class="desc">跨對話記住的偏好與事實（綁你的帳號）。可刪除不想保留的。</div>
    <div class="mem-list">${items}</div>`;
  document.body.append(overlay, panel);
  const closeAll = () => { overlay.remove(); panel.remove(); };
  overlay.onclick = closeAll; panel.querySelector(".close").onclick = closeAll;
  panel.querySelectorAll(".mem-item .del").forEach(btn => btn.onclick = async () => {
    const id = btn.closest(".mem-item").dataset.id;
    await api("/memories/"+id, { method:"DELETE" });
    btn.closest(".mem-item").remove();
  });
}

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg){
  let t = $(".toast"); if (t) t.remove();
  t = document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t);
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.remove(), 3500);
}
