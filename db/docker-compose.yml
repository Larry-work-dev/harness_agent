# DB 這包：Postgres(pgvector) + pgAdmin。獨立啟停、獨立備份。
# 啟動：docker compose -f db/docker-compose.yml up -d
services:
  db:
    image: pgvector/pgvector:pg16      # 官方已內含 pgvector，免自己編
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: harness
    ports:
      - "5432:5432"                    # 對外開放（給 pgAdmin / 本機工具），不需要可移除
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [harness-net]

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: larry_chen@avc.co
      PGADMIN_DEFAULT_PASSWORD: 123456
    ports:
      - "5050:80"                      # 瀏覽器開 http://localhost:5050
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks: [harness-net]

volumes:
  pgdata:
  pgadmin-data:

networks:
  harness-net:
    name: harness-net                  # 固定名稱，讓應用那包以 external 方式接上
